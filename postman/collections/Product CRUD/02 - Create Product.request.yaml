$kind: http-request
name: Create Product
url: "{{baseUrl}}/api/product"
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  mode: raw
  raw: |
    {
      "name": "Test Product",
      "description": "A product created by Postman tests",
      "price": 19.99,
      "imageUrl": "https://example.com/product.jpg"
    }
  options:
    raw:
      language: json
tests: |
  pm.test("Status is 201 Created", function () {
    pm.response.to.have.status(201);
  });

  pm.test("Location header is present", function () {
    pm.response.to.have.header("Location");
  });

  pm.test("Response has created product fields", function () {
    const body = pm.response.json();
    pm.expect(body).to.have.property("id");
    pm.expect(body.name).to.eql("Test Product");
    pm.expect(body.description).to.eql("A product created by Postman tests");
    pm.expect(body.price).to.eql(19.99);
  });

  pm.test("ID is a positive integer", function () {
    const body = pm.response.json();
    pm.expect(body.id).to.be.a("number").and.to.be.above(0);
  });

  // Save ID for use in subsequent requests
  const body = pm.response.json();
  pm.environment.set("productId", body.id);
order: 2000000000000
