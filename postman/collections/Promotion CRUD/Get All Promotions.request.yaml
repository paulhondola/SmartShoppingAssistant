$kind: http-request
url: "{{baseUrl}}/api/promotion"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response is an array", function () {
        const body = pm.response.json();
        pm.expect(body).to.be.an("array");
      });

      pm.test("Each promotion has required fields", function () {
        const body = pm.response.json();
        body.forEach(function (promotion) {
          pm.expect(promotion).to.have.property("id");
          pm.expect(promotion).to.have.property("name");
          pm.expect(promotion).to.have.property("type");
          pm.expect(promotion).to.have.property("threshold");
          pm.expect(promotion).to.have.property("reward");
          pm.expect(promotion).to.have.property("rewardValue");
          pm.expect(promotion).to.have.property("isActive");
        });
      });
    language: text/javascript
order: 1000
