$kind: http-request
url: "{{baseUrl}}/api/promotion"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |
    {
      "name": "Test Promotion",
      "type": 0,
      "threshold": 3,
      "reward": 1,
      "rewardValue": 10,
      "isActive": true
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 201 Created", function () {
        pm.response.to.have.status(201);
      });

      pm.test("Location header is present", function () {
        pm.response.to.have.header("Location");
      });

      pm.test("Response has created promotion fields", function () {
        const body = pm.response.json();
        pm.expect(body).to.have.property("id");
        pm.expect(body.name).to.eql("Test Promotion");
        pm.expect(body.type).to.eql(0);
        pm.expect(body.threshold).to.eql(3);
        pm.expect(body.reward).to.eql(1);
        pm.expect(body.rewardValue).to.eql(10);
        pm.expect(body.isActive).to.eql(true);
      });

      pm.test("ID is a positive integer", function () {
        const body = pm.response.json();
        pm.expect(body.id).to.be.a("number").and.to.be.above(0);
      });

      // Save ID for use in subsequent requests
      const body = pm.response.json();
      pm.environment.set("promotionId", body.id);
    language: text/javascript
order: 2000
