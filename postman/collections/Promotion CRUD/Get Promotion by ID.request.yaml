$kind: http-request
url: "{{baseUrl}}/api/promotion/{{promotionId}}"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response has correct ID", function () {
        const body = pm.response.json();
        pm.expect(body.id).to.eql(parseInt(pm.environment.get("promotionId")));
      });

      pm.test("Response has required fields", function () {
        const body = pm.response.json();
        pm.expect(body).to.have.property("id");
        pm.expect(body).to.have.property("name");
        pm.expect(body).to.have.property("type");
        pm.expect(body).to.have.property("threshold");
        pm.expect(body).to.have.property("reward");
        pm.expect(body).to.have.property("rewardValue");
        pm.expect(body).to.have.property("isActive");
      });

      pm.test("Name matches created value", function () {
        const body = pm.response.json();
        pm.expect(body.name).to.eql("Test Promotion");
      });
    language: text/javascript
order: 3000
