$kind: http-request
url: "{{baseUrl}}/api/promotion/{{promotionId}}"
method: GET
headers:
  Accept: application/json
scripts:
  - type: beforeRequest
    code: |-
      // Delete the promotion created in step 02 before verifying 404
      const baseUrl = pm.environment.get("baseUrl");
      const promotionId = pm.environment.get("promotionId");
      if (promotionId) {
        pm.sendRequest(
          {
            url: baseUrl + "/api/promotion/" + promotionId,
            method: "DELETE"
          },
          function (err, res) {
            if (err) {
              console.error("Failed to delete promotion:", err);
            } else {
              console.log("Promotion deleted, status:", res.status);
            }
          }
        );
      }
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Status is 404 Not Found", function () {
        pm.response.to.have.status(404);
      });

      // Clean up promotionId since the resource is gone
      pm.environment.unset("promotionId");
    language: text/javascript
order: 6000
