$kind: http-request
url: "{{baseUrl}}/api/category/{{deleteCategoryId}}"
method: DELETE
headers:
  Accept: application/json
scripts:
  - type: beforeRequest
    code: |-
      // Create a placeholder category to delete, so seeded data is never destroyed
      const baseUrl = pm.environment.get("baseUrl");
      pm.sendRequest(
        {
          url: baseUrl + "/api/category",
          method: "POST",
          header: { "Content-Type": "application/json" },
          body: {
            mode: "raw",
            raw: JSON.stringify({
              name: "Placeholder Category (to be deleted)",
              description: "Temporary category created by Postman pre-request script for delete test."
            })
          }
        },
        function (err, res) {
          if (err) {
            console.error("Failed to create placeholder category:", err);
          } else {
            const created = res.json();
            pm.environment.set("deleteCategoryId", created.id);
            console.log("Placeholder category created with ID:", created.id);
          }
        }
      );
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Status is 204 No Content", function () {
        pm.response.to.have.status(204);
      });

      pm.test("Response body is empty", function () {
        pm.expect(pm.response.text()).to.be.empty;
      });

      // Clean up the temporary variable
      pm.environment.unset("deleteCategoryId");
    language: text/javascript
order: 5000
