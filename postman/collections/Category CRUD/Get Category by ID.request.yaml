$kind: http-request
url: "{{baseUrl}}/api/category/{{categoryId}}"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response has correct ID", function () {
        const body = pm.response.json();
        pm.expect(body.id).to.eql(parseInt(pm.environment.get("categoryId")));
      });

      pm.test("Response has required fields", function () {
        const body = pm.response.json();
        pm.expect(body).to.have.property("id");
        pm.expect(body).to.have.property("name");
        pm.expect(body).to.have.property("description");
        pm.expect(body).to.have.property("products");
        pm.expect(body.products).to.be.an("array");
      });

      pm.test("Name matches created value", function () {
        const body = pm.response.json();
        pm.expect(body.name).to.eql("Test Category");
      });
    language: text/javascript
order: 3000
