$kind: http-request
url: "{{baseUrl}}/api/category/{{categoryId}}"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "name": "Test Category (Updated)",
      "description": "Description updated by Postman tests"
    }
scripts:
  - type: beforeRequest
    code: |-
      if (!pm.environment.get("categoryId")) {
        pm.environment.set("categoryId", 1);
      }
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Name was updated", function () {
        const body = pm.response.json();
        pm.expect(body.name).to.eql("Test Category (Updated)");
      });

      pm.test("Description was updated", function () {
        const body = pm.response.json();
        pm.expect(body.description).to.eql("Description updated by Postman tests");
      });

      pm.test("ID is unchanged", function () {
        const body = pm.response.json();
        pm.expect(body.id).to.eql(parseInt(pm.environment.get("categoryId")));
      });

      pm.test("Products field is still present", function () {
        const body = pm.response.json();
        pm.expect(body).to.have.property("products");
        pm.expect(body.products).to.be.an("array");
      });
    language: text/javascript
order: 4000
