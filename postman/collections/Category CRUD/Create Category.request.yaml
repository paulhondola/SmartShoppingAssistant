$kind: http-request
url: "{{baseUrl}}/api/category"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |
    {
      "name": "Test Category",
      "description": "A category created by Postman tests"
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 201 Created", function () {
        pm.response.to.have.status(201);
      });

      pm.test("Location header is present", function () {
        pm.response.to.have.header("Location");
      });

      pm.test("Response has created category fields", function () {
        const body = pm.response.json();
        pm.expect(body).to.have.property("id");
        pm.expect(body.name).to.eql("Test Category");
        pm.expect(body.description).to.eql("A category created by Postman tests");
        pm.expect(body.products).to.be.an("array");
      });

      pm.test("ID is a positive integer", function () {
        const body = pm.response.json();
        pm.expect(body.id).to.be.a("number").and.to.be.above(0);
      });

      // Save ID for use in subsequent requests
      const body = pm.response.json();
      pm.environment.set("categoryId", body.id);
    language: text/javascript
order: 2000
