$kind: http-request
url: "{{baseUrl}}/api/category"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response is an array", function () {
        const body = pm.response.json();
        pm.expect(body).to.be.an("array");
      });

      pm.test("Each category has required fields", function () {
        const body = pm.response.json();
        body.forEach(function (category) {
          pm.expect(category).to.have.property("id");
          pm.expect(category).to.have.property("name");
          pm.expect(category).to.have.property("description");
          pm.expect(category).to.have.property("products");
          pm.expect(category.products).to.be.an("array");
        });
      });
    language: text/javascript
order: 1000
